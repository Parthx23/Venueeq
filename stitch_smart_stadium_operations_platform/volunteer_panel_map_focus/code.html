<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StadiumOps - Volunteer Panel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {},
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "2xl": "1rem",
                            "3xl": "1.5rem",
                            "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                            "headline": ["Public Sans", "sans-serif"],
                            "body": ["Public Sans", "sans-serif"],
                            "label": ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white text-zinc-900 font-body antialiased flex flex-col h-screen overflow-hidden selection:bg-blue-200">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-white border-b border-zinc-200 z-50 shrink-0">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-zinc-200 shrink-0">
<img alt="Volunteer profile photo" class="w-full h-full object-cover" data-alt="close up portrait of a young volunteer with a friendly smile, clear daytime lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPRTPKn-Gq-HO9dQc16HXlTPnmTUMiAfsbVObnavMykuf7IHs8dlVZYRAm15Ho6TzYnbySVYzaMr6RGnNVlh_WlaIal5F4Q-ywWL3Pbjjp20_Kjadc3THzn13GNAjktyA_NibMUsxKA4i-OYsU_rslGA4XhmpDfRLAr7DUWt-DvCJb-JgjU0PQRChHesL3hJa0cstuDnsPB9OU9E0EWhEojLsJV8A7eckRby82VvxBthWkSl7GNkG0kvkmbkPT2eb_RvUi9ElZZazV"/>
</div>
<h1 class="text-xl font-bold tracking-tighter text-zinc-900 font-headline">StadiumOps</h1>
</div>
<button class="text-zinc-500 hover:bg-zinc-100 transition-colors duration-150 ease-in-out p-1.5 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 relative flex flex-col w-full h-full">
<!-- Map View (Background) -->
<div class="absolute inset-0 bg-zinc-100 z-0 overflow-hidden">
<img alt="Stadium Map" class="w-full h-full object-cover opacity-60 mix-blend-multiply" data-alt="minimalist architectural top-down view map of a large sports stadium complex with distinct zones and pathways in soft grayscale" data-location="Wembley Stadium, London" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-wBtOdDVzO5a5Vbc1q0BllxYRKwAP92hfE7mZPxAKMdouN1doml3Ei_ejBtehwWqmd0B0u7zLgSHKB4RCZ-LMkOuiNfHdoUXLL0WIi-Olu7BegN-VbVbooNVAFIPQvjIy3hgW2xvR-MvLZF15gnOfHDS96o_OEAoz5D90vks-olpYTuaR00_t_VOUOGN_QAb_nvfu685FX8dByIledDNtgdwpOW-8_tLM1tOC3VhX0SabD9BB9mk1I9gXCY_wAF14XPFtB6lTXbp7"/>
<!-- Simulated Heatmap / Crowd Density Gradient -->
<div class="absolute top-1/4 right-1/4 w-64 h-64 bg-red-500 rounded-full blur-[80px] opacity-20 pointer-events-none"></div>
<div class="absolute top-1/2 left-1/3 w-48 h-48 bg-yellow-400 rounded-full blur-[60px] opacity-20 pointer-events-none"></div>
<!-- Map Markers -->
<!-- Current Location -->
<div class="absolute top-[45%] left-[40%] flex flex-col items-center z-10">
<div class="w-4 h-4 bg-blue-600 border-2 border-white rounded-full shadow-md z-10 relative"></div>
<div class="w-12 h-12 bg-blue-500 rounded-full opacity-20 absolute -top-4 -left-4 pointer-events-none"></div>
<span class="mt-1 text-[10px] font-bold text-blue-800 bg-white/80 px-1.5 py-0.5 rounded shadow-sm backdrop-blur-sm">You</span>
</div>
<!-- Incident Marker -->
<div class="absolute top-[30%] right-[20%] flex flex-col items-center z-10">
<div class="w-8 h-8 bg-red-100 border border-red-500 rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-red-600 text-lg" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
</div>
</div>
<!-- Task Marker -->
<div class="absolute top-[60%] left-[65%] flex flex-col items-center z-10">
<div class="w-8 h-8 bg-white border border-zinc-300 rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-zinc-700 text-lg" data-icon="assignment">assignment</span>
</div>
</div>
</div>
<!-- Slide-up Drawer -->
<div class="absolute bottom-[72px] left-0 w-full bg-white/95 backdrop-blur-xl rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.08)] z-20 border-t border-zinc-200/50 flex flex-col p-6 max-h-[60%] overflow-y-auto overscroll-contain">
<!-- Drawer Handle -->
<div class="w-12 h-1.5 bg-zinc-200 rounded-full mx-auto mb-6 shrink-0"></div>
<h2 class="text-lg font-bold font-headline mb-4 text-zinc-900">Current Task</h2>
<!-- Task Card (High-end UI pattern instead of standard list) -->
<div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-5 mb-6 shadow-sm">
<div class="flex justify-between items-start mb-3">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-blue-500 block"></span>
<span class="text-xs font-semibold uppercase tracking-wider text-blue-700 font-label">Gate 4 Overflow</span>
</div>
<span class="text-xs font-medium text-zinc-500 font-label bg-white px-2 py-1 rounded-md border border-zinc-100 shadow-sm">High Priority</span>
</div>
<h3 class="text-zinc-900 font-semibold mb-1">Assist Crowd Redirection</h3>
<p class="text-sm text-zinc-600 font-body leading-relaxed mb-4">Heavy congestion reported near the East turnstiles. Direct attendees towards Gate 5 and clear the immediate walkway.</p>
<div class="flex gap-2">
<button class="flex-1 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 text-sm font-semibold py-2 px-4 rounded-lg transition-colors">Details</button>
<button class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-colors shadow-sm">Complete</button>
</div>
</div>
<!-- Emergency Report Action -->
<div class="mt-auto pt-2">
<button class="w-full bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 font-bold py-4 px-4 rounded-xl flex items-center justify-center gap-3 transition-colors">
<span class="material-symbols-outlined" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
                    Emergency Report
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 bg-white border-t border-zinc-200 shrink-0 h-[72px] box-content">
<!-- Inactive Tab: Tasks -->
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2 hover:text-zinc-900 opacity-80 transition-opacity w-16 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="assignment">assignment</span>
<span class="text-[11px] font-semibold uppercase tracking-wider font-label">Tasks</span>
</a>
<!-- Active Tab: Live Map -->
<a class="flex flex-col items-center justify-center text-blue-600 border-t-2 border-blue-600 pt-2 opacity-100 w-16" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="text-[11px] font-semibold uppercase tracking-wider font-label text-blue-600">Live Map</span>
</a>
<!-- Inactive Tab: Report -->
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2 hover:text-zinc-900 opacity-80 transition-opacity w-16 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="emergency">emergency</span>
<span class="text-[11px] font-semibold uppercase tracking-wider font-label">Report</span>
</a>
<!-- Inactive Tab: Status -->
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2 hover:text-zinc-900 opacity-80 transition-opacity w-16 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="person">person</span>
<span class="text-[11px] font-semibold uppercase tracking-wider font-label">Status</span>
</a>
</nav>
</body></html>
