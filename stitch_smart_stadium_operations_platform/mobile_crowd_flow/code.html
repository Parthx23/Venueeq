<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>STADIUM PRO - Crowd Flow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
            "teal": {
                "400": "#2dd4bf",
                "600": "#0d9488"
            },
            "zinc": {
                "50": "#fafafa",
                "100": "#f4f4f5",
                "200": "#e4e4e7",
                "400": "#a1a1aa",
                "500": "#71717a",
                "800": "#27272a",
                "900": "#18181b",
                "950": "#09090b"
            }
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {},
        "fontFamily": {
                "headline": [
                        "Public Sans"
                ],
                "body": [
                        "Public Sans"
                ],
                "label": [
                        "Public Sans"
                ]
        }
    },
  }
}
</script>
<style>
    body { font-family: 'Public Sans', sans-serif; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen relative flex flex-col font-body">
<!-- TopAppBar -->
<header class="sticky top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 backdrop-blur-md bg-white/95 border-b border-zinc-200">
<div class="flex items-center">
<button class="hover:bg-zinc-50 active:scale-98 transition-all p-2 rounded-full -ml-2 text-teal-600">
<span class="material-symbols-outlined">grid_view</span>
</button>
</div>
<div class="text-lg font-black tracking-tighter uppercase text-zinc-900 font-headline">
        STADIUM PRO
    </div>
<div class="flex items-center">
<button class="hover:bg-zinc-50 active:scale-98 transition-all rounded-full overflow-hidden w-8 h-8 border border-zinc-200">
<img alt="User profile avatar" class="w-full h-full object-cover" data-alt="close up headshot of a person with a neutral expression on a light background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuL09by2iQfPlZq1l1mIRX1u8LjZfZgoMoNzjfJzjPExcfzpcQtCAyUldPIbZMs8U-PuetX_OLOPEZ0aSbv4rfwQDj0EsAZXdLmhj7yu-ZGnqZAmWyoXRy9LxA7alpi-GIcL4ePqYhr6-iD84HpNAhvntuIfeQ6zfWZTs6iRLVa1zq_JTCYYoEHT4lGQNdWdh8gUL2Ozgetky4OqwTGWx9iT1p_a7uxZkgpDxEK-00S06fME6guQBJnfWmgDJ4I2LJWWCTbwFHmssy"/>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col relative pb-24">
<!-- Header Section -->
<div class="px-4 py-4 bg-white shadow-sm z-10 relative">
<div class="flex justify-between items-end mb-2">
<div>
<h1 class="text-2xl font-bold font-headline tracking-tight text-zinc-900">Crowd Flow</h1>
<p class="text-sm text-zinc-500 mt-1">Live Stadium Density</p>
</div>
<div class="flex items-center space-x-2 bg-teal-50 px-3 py-1.5 rounded-full border border-teal-100">
<span class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></span>
<span class="text-xs font-bold text-teal-700 tracking-wide uppercase">Live</span>
</div>
</div>
<!-- Action Chips -->
<div class="flex overflow-x-auto space-x-2 pb-2 mt-4 hide-scrollbar">
<button class="flex-shrink-0 px-4 py-2 bg-zinc-900 text-white rounded-full text-sm font-medium flex items-center shadow-sm">
<span class="material-symbols-outlined text-sm mr-2">route</span>
                Auto-Reroute
            </button>
<button class="flex-shrink-0 px-4 py-2 bg-white border border-zinc-200 text-zinc-700 rounded-full text-sm font-medium flex items-center hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined text-sm mr-2">local_dining</span>
                Concessions
            </button>
<button class="flex-shrink-0 px-4 py-2 bg-white border border-zinc-200 text-zinc-700 rounded-full text-sm font-medium flex items-center hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined text-sm mr-2">wc</span>
                Restrooms
            </button>
</div>
</div>
<!-- Map Container (Takes remaining space) -->
<div class="flex-grow relative bg-zinc-200 overflow-hidden">
<!-- Simulated Map Background -->
<div class="absolute inset-0 bg-zinc-300 w-full h-full" data-alt="blueprint style map of a large stadium complex with seating sections and concourses" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBTNix8SY-mjeiL2iD9W1cA_GPctWflC-vBbH8D1zZRpO0_NBHU8VW7Izy8ytNux3XI83-dfOBHXQCBYMXp1HB0o1t5sLotT0TqfvOP5oo-ZyvDni48L6Zpk4NqerbpA7rInY7f-QlBptUKnBVdDCJKtHUXaV85Y6lhJzSnErq-L5yAecOesVdvC4EJRU-Uygrfkz1qfYoTjejgO4f3ZSsBEX7Tr-B1D-euHN5144po8Vy63AoTa3mNiH0ACTlJGLBV6yvDiuwHDCz_'); background-size: cover; background-position: center; opacity: 0.6;"></div>
<!-- Heatmap Overlay Elements (Simulated) -->
<div class="absolute top-1/4 left-1/4 w-32 h-32 bg-red-500/40 rounded-full blur-xl mix-blend-multiply"></div>
<div class="absolute top-1/3 right-1/4 w-40 h-40 bg-orange-500/40 rounded-full blur-xl mix-blend-multiply"></div>
<div class="absolute bottom-1/3 left-1/2 w-48 h-48 bg-teal-500/40 rounded-full blur-xl mix-blend-multiply"></div>
<!-- Hotspot Markers -->
<div class="absolute top-[28%] left-[28%] flex flex-col items-center">
<div class="w-4 h-4 bg-red-600 rounded-full border-2 border-white shadow-md animate-ping absolute opacity-75"></div>
<div class="w-4 h-4 bg-red-600 rounded-full border-2 border-white shadow-md relative z-10"></div>
<div class="mt-1 bg-white/90 backdrop-blur-sm px-2 py-0.5 rounded text-[10px] font-bold text-zinc-800 shadow-sm whitespace-nowrap">Gate A (Congested)</div>
</div>
<div class="absolute bottom-[40%] right-[30%] flex flex-col items-center">
<div class="w-3 h-3 bg-teal-500 rounded-full border-2 border-white shadow-md relative z-10"></div>
<div class="mt-1 bg-white/90 backdrop-blur-sm px-2 py-0.5 rounded text-[10px] font-bold text-zinc-800 shadow-sm whitespace-nowrap">Gate C (Clear)</div>
</div>
<!-- Time Slider Panel (Floating at bottom of map) -->
<div class="absolute bottom-4 left-4 right-4 bg-white/95 backdrop-blur-md rounded-xl shadow-lg border border-zinc-200/50 p-4">
<div class="flex justify-between items-center mb-3">
<span class="text-sm font-semibold text-zinc-900">Predictive Flow</span>
<span class="text-xs font-medium text-zinc-500">+15 mins</span>
</div>
<div class="relative w-full h-2 bg-zinc-200 rounded-full">
<!-- Filled Track -->
<div class="absolute top-0 left-0 h-full bg-teal-500 rounded-full" style="width: 35%;"></div>
<!-- Thumb -->
<div class="absolute top-1/2 -mt-2 -ml-2 w-4 h-4 bg-white border-2 border-teal-600 rounded-full shadow cursor-pointer" style="left: 35%;"></div>
<!-- Markers -->
<div class="absolute top-3 left-0 text-[10px] text-zinc-400 font-medium">Now</div>
<div class="absolute top-3 left-1/4 text-[10px] text-zinc-400 font-medium">+15m</div>
<div class="absolute top-3 left-1/2 text-[10px] text-zinc-400 font-medium">+30m</div>
<div class="absolute top-3 right-0 text-[10px] text-zinc-400 font-medium">+1h</div>
</div>
<div class="mt-6 flex justify-between items-center border-t border-zinc-100 pt-3">
<div class="text-xs text-zinc-500">Predicted Peak: <span class="font-bold text-orange-600">Halftime</span></div>
<button class="text-xs font-bold text-teal-600 uppercase tracking-wide">View Detail</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-safe bg-white/98 border-t border-zinc-200 h-20 transition-all duration-200 ease-in-out md:hidden font-sans text-[10px] font-bold uppercase tracking-widest">
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2.5 hover:text-zinc-900 w-1/5" href="#">
<span class="material-symbols-outlined mb-1 text-2xl">home</span>
<span>Home</span>
</a>
<a class="flex flex-col items-center justify-center text-teal-600 border-t-2 border-teal-600 pt-2 w-1/5" href="#">
<span class="material-symbols-outlined mb-1 text-2xl" style="font-variation-settings: 'FILL' 1;">map</span>
<span>Map</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2.5 hover:text-zinc-900 w-1/5" href="#">
<span class="material-symbols-outlined mb-1 text-2xl">format_list_bulleted</span>
<span>Queues</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2.5 hover:text-zinc-900 w-1/5 relative" href="#">
<span class="material-symbols-outlined mb-1 text-2xl">notifications</span>
<span class="absolute top-2 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
<span>Alerts</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2.5 hover:text-zinc-900 w-1/5" href="#">
<span class="material-symbols-outlined mb-1 text-2xl">person</span>
<span>Profile</span>
</a>
</nav>
<style>
    /* Hide scrollbar for horizontal scroll areas */
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
</body></html>
