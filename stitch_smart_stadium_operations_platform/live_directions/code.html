<html class="light" lang="en"><head>

<style>
        body {
            font-family: 'Public Sans', sans-serif;
            margin: 0;
            padding: 0;

<body class="bg-slate-50 text-slate-900 antialiased h-screen w-screen flex flex-col relative">
<!-- TopNavBar (Web Only) -->

<div class="text-xl font-black tracking-tight text-slate-900 dark:text-white">StadiumAI</div>
<nav class="flex gap-6">
<a class="font-sans text-sm font-medium text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400 pb-1 hover:text-blue-500 dark:hover:text-blue-300 transition-colors" href="#">Map</a>
<a class="font-sans text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-blue-500 dark:hover:text-blue-300 transition-colors" href="#">Tickets</a>

<button class="scale-95 active:opacity-80 transition-transform">
<span class="material-symbols-outlined text-slate-600">account_circle</span>
</button>
</div>

<main class="flex-1 relative w-full h-full md:pt-16">

<div class="absolute inset-0 w-full h-full bg-slate-200 z-0">

<div class="absolute inset-0 z-10 pointer-events-none">

<svg class="absolute top-0 left-0 drop-shadow-md" height="100%" preserveaspectratio="none" viewbox="0 0 400 800" width="100%">
<!-- The Path -->
<path class="opacity-90" d="M 200,600 L 200,450 C 200,400 150,380 150,320 L 150,200" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<path d="M 200,600 L 200,450 C 200,400 150,380 150,320 L 150,200" fill="none" stroke="#38bdf8" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<!-- Origin Point -->
<circle cx="200" cy="600" fill="#fff" r="10" stroke="#0ea5e9" stroke-width="4"></circle>
<!-- Destination Point -->
<circle cx="150" cy="200" fill="#0ea5e9" r="14"></circle>
<circle cx="150" cy="200" fill="#fff" r="6"></circle>
</svg>
</div>
<!-- Location Markers (HTML Overlay) -->
<div class="absolute z-20 top-[600px] left-[200px] -translate-x-1/2 mt-3 bg-white px-3 py-1.5 rounded-full shadow-md border border-slate-100 flex items-center gap-1.5 whitespace-nowrap">
<div class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></div>
<span class="text-xs font-semibold text-slate-700">Gate A</span>
</div>
<div class="absolute z-20 top-[170px] left-[150px] -translate-x-1/2 -mt-4 bg-slate-900 text-white px-3 py-1.5 rounded-lg shadow-lg flex items-center gap-2 whitespace-nowrap">
<span class="material-symbols-outlined text-[16px] text-yellow-400">fastfood</span>
<span class="text-xs font-semibold">Burger Haven</span>
<!-- Caret -->
<div class="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-slate-900 rotate-45"></div>
</div>
</div>
<!-- Floating Direction Card (Top) -->
<div class="absolute top-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-96 z-30">
<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-slate-100 overflow-hidden">

<div class="px-5 py-4 flex items-center justify-between border-b border-slate-100">
<div>
<h2 class="text-2xl font-bold text-slate-900 tracking-tight flex items-baseline gap-1">
                            4 <span class="text-sm font-medium text-slate-500 uppercase tracking-wide">mins</span>
</h2>
<p class="text-sm text-slate-500 font-medium mt-0.5">350 ft • Arrive by 7:15 PM</p>
</div>
<button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Active Instruction -->
<div class="px-5 py-5 flex items-start gap-4 bg-blue-50/50">
<div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center shrink-0 shadow-sm border border-blue-200">
<span class="material-symbols-outlined text-blue-600 text-2xl" style="font-variation-settings: 'FILL' 1;">turn_left</span>
</div>
<div>
<h3 class="text-lg font-bold text-slate-900 leading-tight">Turn left at Section 105</h3>
<p class="text-sm text-slate-600 mt-1">Towards Main Concourse</p>
</div>
</div>
</div>
</div>
<!-- Recenter FAB -->
<button class="absolute bottom-28 md:bottom-8 right-4 z-30 w-12 h-12 bg-white rounded-full shadow-lg border border-slate-100 flex items-center justify-center text-slate-700 hover:text-blue-600 active:scale-95 transition-all">
<span class="material-symbols-outlined">my_location</span>
</button>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 w-full rounded-t-3xl z-50 bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">

<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 tap-highlight-transparent active:scale-90 duration-200 w-16 py-1.5 rounded-xl" href="#">
<span class="material-symbols-outlined mb-1">sensors</span>
<span class="text-[11px] font-semibold uppercase tracking-wider">Live</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-xl px-4 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 tap-highlight-transparent active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="text-[11px] font-semibold uppercase tracking-wider">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 tap-highlight-transparent active:scale-90 duration-200 w-16 py-1.5 rounded-xl" href="#">
<span class="material-symbols-outlined mb-1">smart_toy</span>
<span class="text-[11px] font-semibold uppercase tracking-wider">Assistant</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 tap-highlight-transparent active:scale-90 duration-200 w-16 py-1.5 rounded-xl" href="#">
<span class="material-symbols-outlined mb-1">person</span>
