<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stadium Pro - AI Assistant Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {},
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {},
                    fontFamily: {
                        "headline": ["Public Sans", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-50 text-gray-900 font-body min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="sticky top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 backdrop-blur-md bg-white/95 border-b border-gray-200">
<button aria-label="Menu" class="text-teal-600 hover:bg-gray-50 transition-colors rounded-full p-2 active:scale-98 transition-all">
<span class="material-symbols-outlined text-2xl">grid_view</span>
</button>
<h1 class="text-lg font-black tracking-tighter uppercase text-gray-900 font-headline">STADIUM PRO</h1>
<button aria-label="Profile" class="hover:bg-gray-50 transition-colors rounded-full p-1 active:scale-98 transition-all">
<img alt="User profile avatar" class="w-8 h-8 rounded-full border border-gray-200" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtwZRCLskHvjmTzAwxGG_otgWImjS0Q6Oqfhc4zbjwFs4OVOMFYgoqxFaH546pFit4iGCLeKD9cKWiLE2T_jkaxGqyhhP3HGSSj5Lga8ewLI5iDZk-mSLVF3PoibzljT77yNSUFerd4Z51sTfT8YyoC47jfWFMdhoa0ySCAj3OIzUWx_yAOiFB6BTy2p1bSyDfwM1KrdHSr0MZNuMzL1huBZOQ_oqevG-V5ANR394Ed-idavy_yLUnQm6RfP5i9CiNHdzPMcqTl74g"/>
</button>
</header>
<!-- Main Content -->
<main class="p-4 space-y-6">
<!-- Header -->
<div class="mb-6">
<h2 class="text-2xl font-bold tracking-tight text-gray-900 mb-1">AI Assistant</h2>
<p class="text-sm text-gray-500">Monitoring stadium operations</p>
</div>
<!-- Small Map View -->
<section class="relative h-48 rounded-xl overflow-hidden shadow-sm border border-gray-200 group">
<img alt="Stadium Map" class="w-full h-full object-cover" data-alt="overhead view of a large modern sports stadium at night with bright field lights and surrounding city infrastructure" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7B2S6NIkJ5FcPv7NZVuAslj1HCqnRO5gjU6g8tkkZCZ228FsBMXBlPECQgqu-TAdkQ1Sg82qn9fBRvudtJ4UciFPMCfgFWjQmHfHOC7TocmBhrXJU4-aYzV0NCo6M3rBqL8FWYqQ0JjgFjf9BAwqtqmOlkxeR-Jo3lHKXM9zmvFG9qQ7QI-HK9E5r8_pQpvUJymPAm2SNyWkGO17_bzfVROY-9C5csYTShw6ZswjvlYgXKitbB977KYWl9EYU_CrrRalpHLeVtsd2"/>
<!-- Map Overlay UI -->
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/20 p-4 flex flex-col justify-between">
<div class="flex justify-end">
<span class="bg-white/90 backdrop-blur-sm text-xs font-semibold px-2 py-1 rounded-full shadow-sm text-gray-800 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-teal-600">location_on</span> Live View
                    </span>
</div>
<!-- Map Markers (Simulated) -->
<div class="absolute top-1/3 left-1/4">
<div class="relative w-4 h-4 bg-red-500 rounded-full border-2 border-white shadow-md flex items-center justify-center animate-pulse"></div>
<span class="absolute top-5 -left-4 bg-white/90 text-[10px] font-bold px-1.5 py-0.5 rounded shadow text-gray-800 whitespace-nowrap">Gate A</span>
</div>
<div class="absolute bottom-1/3 right-1/3">
<div class="relative w-3 h-3 bg-teal-500 rounded-full border border-white shadow-md"></div>
</div>
<div class="absolute top-1/2 right-1/4">
<div class="relative w-3 h-3 bg-amber-500 rounded-full border border-white shadow-md"></div>
</div>
</div>
</section>
<!-- AI Proactive Suggestions Chat Interface -->
<section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[400px]">
<!-- Chat Header -->
<div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-teal-100 rounded-full flex items-center justify-center text-teal-700">
<span class="material-symbols-outlined text-[18px]">smart_toy</span>
</div>
<div>
<h3 class="text-sm font-semibold text-gray-900">Pro-Assist</h3>
<p class="text-[10px] text-teal-600 font-medium flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-teal-500 rounded-full"></span> Online
                        </p>
</div>
</div>
<button class="text-gray-400 hover:text-gray-600">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Chat Area -->
<div class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50/50">
<!-- AI Message 1 -->
<div class="flex gap-3">
<div class="w-6 h-6 bg-teal-100 rounded-full flex-shrink-0 flex items-center justify-center text-teal-700 mt-1">
<span class="material-symbols-outlined text-[14px]">smart_toy</span>
</div>
<div class="bg-white p-3 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 text-sm text-gray-800 max-w-[85%]">
<p class="mb-2">Traffic is building up at <strong>Gate A</strong>. Projected wait time is exceeding 15 minutes.</p>
<!-- Actionable Buttons -->
<div class="space-y-2 mt-3">
<button class="w-full text-left px-3 py-2 bg-teal-50 hover:bg-teal-100 text-teal-700 rounded-lg border border-teal-200 text-xs font-semibold flex justify-between items-center transition-colors">
<span>Optimize Gate A</span>
<span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
<button class="w-full text-left px-3 py-2 bg-white hover:bg-gray-50 text-gray-700 rounded-lg border border-gray-200 text-xs font-medium flex justify-between items-center transition-colors">
<span>View Live Camera</span>
</button>
</div>
</div>
</div>
<!-- AI Message 2 -->
<div class="flex gap-3">
<div class="w-6 h-6 bg-teal-100 rounded-full flex-shrink-0 flex items-center justify-center text-teal-700 mt-1">
<span class="material-symbols-outlined text-[14px]">smart_toy</span>
</div>
<div class="bg-white p-3 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 text-sm text-gray-800 max-w-[85%]">
<p class="mb-2">Concession Stand 4 (Section 112) is reporting low inventory on beverages.</p>
<div class="space-y-2 mt-3">
<button class="w-full text-left px-3 py-2 bg-white hover:bg-gray-50 text-gray-700 rounded-lg border border-gray-200 text-xs font-medium flex justify-between items-center transition-colors">
<span>Check staff levels</span>
<span class="material-symbols-outlined text-[16px]">group</span>
</button>
</div>
</div>
</div>
</div>
<!-- Input Area -->
<div class="p-3 bg-white border-t border-gray-200">
<div class="relative flex items-center">
<input class="w-full bg-gray-100 border-transparent rounded-full py-2.5 pl-4 pr-12 text-sm focus:border-teal-500 focus:bg-white focus:ring-0 transition-colors text-gray-800" placeholder="Ask Assistant..." type="text"/>
<button class="absolute right-2 p-1.5 bg-teal-600 text-white rounded-full hover:bg-teal-700 transition-colors shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-safe bg-white/98 h-20 border-t border-gray-200 md:hidden backdrop-blur-md">
<button class="flex flex-col items-center justify-center text-teal-600 border-t-2 border-teal-600 pt-2 transition-all duration-200 ease-in-out hover:text-gray-900 w-16">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 pt-2.5 transition-all duration-200 ease-in-out hover:text-gray-900 w-16">
<span class="material-symbols-outlined mb-1">map</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest">Map</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 pt-2.5 transition-all duration-200 ease-in-out hover:text-gray-900 w-16">
<span class="material-symbols-outlined mb-1">format_list_bulleted</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest">Queues</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 pt-2.5 transition-all duration-200 ease-in-out hover:text-gray-900 w-16">
<span class="material-symbols-outlined mb-1">notifications</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 pt-2.5 transition-all duration-200 ease-in-out hover:text-gray-900 w-16">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest">Profile</span>
</button>
</nav>
</body></html>
